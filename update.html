<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ecoMetric | E-Report Platform</title>

    <link rel="stylesheet" href="src/output.css">

    <!-- Remix Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css"
        integrity="sha512-XcIsjKMcuVe0Ucj/xgIXQnytNwBttJbNjltBV18IOnru2lDPe9KRRyvCXw6Y5H415vbBLRm8+q6fmLUU7DfO6Q=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body class="font-jakarta md:px-10">
    <section class="mx-auto my-auto p-6 md:p-10">
        <div class="mb-10 text-green-primary">
            <div class="flex flex-row items-center mb-2 font-bold gap-2 text-xl">
                <i class="ri-arrow-left-s-line"></i>
                <h1 class="text-3xl">Update Laporan</h1>
            </div>
            <p class="pl-7 text-lg">Perbarui informasi terbaru terkait penanganan laporan ini.</p>
        </div>

        <!-- Laporan Lama -->
        <div
            class="border-2 items-center border-gray-300 rounded-xl h-fit py-6 px-4 flex flex-col gap-4 md:gap-0 md:flex-row mx-6">
            <!-- img -->
            <div class="bg-gray-200 h-40 w-full md:w-1/3 rounded-lg flex justify-center items-center">
                <img src="" alt="blm ada img">
            </div>
            <div class="flex flex-col gap-1 w-full px-6">
                <h2 class="text-2xl font-semibold">Jalan Berlubang dan Lampu Jalan Mati</h2>
                <div class="flex flex-row gap-2">
                    <i class="ri-map-pin-2-line"></i>
                    <h3 class="text-lg">Jl. Sudirman Raya</h3>
                </div>

                <!-- tanggal laporan dibuat -->
                <div class="flex flex-row gap-2">
                    <i class="ri-calendar-line"></i>
                    <h3>Dilaporkan Pada 13 Mei 2026</h3>
                </div>

                <hr class="text-gray-400 my-2">

                <!-- id laporn -->
                <div class="flex flex-row justify-between items-center">
                    <p class="text-sm">ID Laporan: #EIOOR-00391</p>
                    <span
                        class="bg-amber-50 border text-xs border-amber-600 text-amber-600 py-2 px-6 rounded-lg">Diproses</span>
                </div>

            </div>
        </div>

        <!-- Input Detail -->
        <div class="m-4 md:my-8 md:mx-6 border-b-2 items-center pb-8 border-green-primary/60">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Judul -->
                <div>
                    <label class="block mb-2 font-medium text-gray-700">
                        Judul Laporan
                    </label>

                    <select
                        class="w-full px-4 py-2 border border-gray-300 rounded-xl outline-none focus:ring-4 focus:ring-gray-200">
                        <option>Jalan & Infrastruktur</option>
                        <option>Kebersihan</option>
                        <option>Lampu Jalan</option>
                        <option>Fasilitas Umum</option>
                        <option>Drainase</option>
                        <option>Lainnya</option>
                    </select>
                </div>
                <!-- Lokasi -->
                <div>
                    <label class="block mb-2 font-medium text-gray-700">
                        Lokasi
                    </label>

                    <input type="text" placeholder="Contoh: Jl.Merdeka"
                        class="w-full px-4 py-2 border border-gray-300 rounded-xl outline-none focus:ring-4 focus:ring-gray-200">
                </div>
                <!-- Email Pelapor -->
                <div>
                    <label class="block mb-2 font-medium text-gray-700">
                        Kecamatan
                    </label>

                    <input type="email" placeholder="Contoh: Bogor"
                        class="w-full px-4 py-2 border border-gray-300 rounded-xl outline-none focus:ring-4 focus:ring-gray-200">
                </div>
                <!-- No Telpon Pelapor -->
                <div>
                    <label class="block mb-2 font-medium text-gray-700">
                        Kelurahan
                    </label>

                    <input type="number" placeholder="Contoh: Sukasirna"
                        class="w-full px-4 py-2 border border-gray-300 rounded-xl outline-none focus:ring-4 focus:ring-gray-200">
                </div>
                <div class="flex flex-col gap-2 mt-4">
                    <label for="">Deskripsi</label>
                    <textarea
                        class="w-full h-40 px-4 py-2 border border-gray-300 rounded-xl outline-none focus:ring-4 focus:ring-gray-200"
                        placeholder="Contoh: Lampu Jalan mati 2 di taman mini" name="" id=""></textarea>
                </div>

                <!-- Input Img -->
                <div class="flex flex-row gap-2">
                    <label
                        class="border-2 h-40 w-full md:w-fit md:mt-12 border-dashed rounded-2xl p-10 flex flex-col items-center justify-center cursor-pointer hover:bg-gray-50 transition">

                        <input type="file" id="upload" accept="image/*" capture="environment" class="hidden">

                        <i class="ri-camera-line text-5xl text-green-700"></i>

                        <p class="mt-4 font-semibold">
                            Ambil Foto
                        </p>

                        <span class="text-sm text-gray-400">
                            Gunakan kamera HP
                        </span>

                    </label>
                    <img id="preview" class="hidden w-full h-40 mt-12 object-cover overflow-hidden rounded-2xl">
                </div>


            </div>

        </div>

        <!-- Input Pelapor -->
        <div class="m-4 md:my-8 md:mx-6 border-b-2  pb-8 border-green-primary/60">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- Judul -->
                <div>
                    <label class="block mb-2 font-medium text-gray-700">
                        Judul Laporan
                    </label>

                    <input type="text" placeholder="Contoh: Jalan Berlubang"
                        class="w-full px-4 py-2 border border-gray-300 rounded-xl outline-none focus:ring-4 focus:ring-gray-200">
                </div>
                <!-- Nama Pelapor -->
                <div>
                    <label class="block mb-2 font-medium text-gray-700">
                        Nama Pelapor
                    </label>

                    <input type="text" placeholder="Contoh: Emma Watson"
                        class="w-full px-4 py-2 border border-gray-300 rounded-xl outline-none focus:ring-4 focus:ring-gray-200">
                </div>
                <!-- Email Pelapor -->
                <div>
                    <label class="block mb-2 font-medium text-gray-700">
                        Email
                    </label>

                    <input type="email" placeholder="Contoh: Emma@gmail.com"
                        class="w-full px-4 py-2 border border-gray-300 rounded-xl outline-none focus:ring-4 focus:ring-gray-200">
                </div>
                <!-- No Telpon Pelapor -->
                <div>
                    <label class="block mb-2 font-medium text-gray-700">
                        No. Telpon
                    </label>

                    <input type="number" placeholder="Contoh: 06767676767"
                        class="w-full px-4 py-2 border border-gray-300 rounded-xl outline-none focus:ring-4 focus:ring-gray-200">
                </div>

            </div>
        </div>

        <button class="bg-green-primary text-white py-2 w-full mx-2 rounded-lg md:w-fit md:px-4 md:ml-6">Simpan
            Perubahan</button>

    </section>

    <script>

        const upload = document.getElementById("upload");
        const preview = document.getElementById("preview");

        upload.addEventListener("change", (e) => {

            const file = e.target.files[0];

            if (file) {

                preview.src = URL.createObjectURL(file);

                preview.classList.remove("hidden");

            }

        });

    </script>

</body>
